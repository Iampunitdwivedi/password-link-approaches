<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>01 — Password Tab Empty State</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #F7F6F3;
    --surface: #FFFFFF;
    --surface-2: #F0EFEC;
    --text-1: #1A1A1A;
    --text-2: #6B6B6B;
    --text-3: #9B9B9B;
    --border: #E5E4E1;
    --border-hover: #D0CFCC;
    --purple: #7C3AED;
    --purple-bg: #F5F0FF;
    --purple-border: #E0D4FC;
    --purple-text: #5B21B6;
    --green: #16A34A;
    --green-bg: #F0FDF4;
    --amber: #D97706;
    --amber-bg: #FFFBEB;
    --red: #DC2626;
    --radius: 10px;
    --radius-sm: 6px;
    --radius-lg: 14px;
    --font: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: var(--font);
    background: var(--bg);
    color: var(--text-1);
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
  }

  /* Screen label */
  .screen-label {
    position: fixed;
    top: 20px;
    left: 24px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .screen-num {
    background: var(--text-1);
    color: #fff;
    font-size: 11px;
    font-weight: 600;
    width: 28px;
    height: 28px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    letter-spacing: -0.2px;
  }
  .screen-title {
    font-size: 13px;
    color: var(--text-2);
    font-weight: 500;
  }
  .screen-title span {
    color: var(--text-3);
    font-weight: 400;
  }

  /* Backdrop overlay */
  .backdrop {
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.3);
    backdrop-filter: blur(2px);
    z-index: 1;
  }

  /* Modal */
  .ff-modal {
    background: var(--surface);
    border-radius: var(--radius-lg);
    border: 1px solid var(--border);
    width: 100%;
    max-width: 460px;
    position: relative;
    z-index: 2;
    box-shadow: 0 8px 32px rgba(0,0,0,0.08), 0 1px 3px rgba(0,0,0,0.04);
    animation: modalIn 0.3s ease;
  }
  @keyframes modalIn {
    from { opacity: 0; transform: translateY(12px) scale(0.98); }
    to { opacity: 1; transform: translateY(0) scale(1); }
  }

  /* Modal header */
  .ff-modal-header {
    padding: 22px 24px 0;
  }
  .ff-close {
    position: absolute;
    top: 18px;
    right: 18px;
    width: 28px;
    height: 28px;
    border: none;
    background: none;
    color: var(--text-3);
    cursor: pointer;
    font-size: 18px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 6px;
    transition: all 0.15s;
  }
  .ff-close:hover {
    background: var(--surface-2);
    color: var(--text-2);
  }
  .ff-title {
    font-size: 15px;
    font-weight: 600;
    color: var(--text-1);
    margin-bottom: 2px;
    padding-right: 28px;
    letter-spacing: -0.2px;
  }
  .ff-subtitle {
    font-size: 12px;
    color: var(--text-3);
    margin-bottom: 16px;
  }

  /* Tabs */
  .ff-tabs {
    display: flex;
    border-bottom: 1px solid var(--border);
    gap: 0;
    padding: 0 24px;
  }
  .ff-tab {
    padding: 10px 16px;
    font-size: 13px;
    font-family: var(--font);
    color: var(--text-3);
    cursor: pointer;
    position: relative;
    border: none;
    background: none;
    font-weight: 400;
    transition: color 0.15s;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .ff-tab:hover {
    color: var(--text-2);
  }
  .ff-tab.active {
    color: var(--text-1);
    font-weight: 500;
  }
  .ff-tab.active::after {
    content: '';
    position: absolute;
    bottom: -1px;
    left: 0;
    right: 0;
    height: 2px;
    background: var(--text-1);
    border-radius: 1px 1px 0 0;
  }
  .badge-new {
    font-size: 9px;
    background: var(--purple);
    color: #fff;
    padding: 1px 5px;
    border-radius: 4px;
    font-weight: 600;
    letter-spacing: 0.4px;
    text-transform: uppercase;
    line-height: 1.4;
  }

  /* Modal body */
  .ff-modal-body {
    padding: 40px 24px 32px;
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
  }

  /* Shield icon */
  .empty-icon {
    width: 72px;
    height: 72px;
    border-radius: 20px;
    background: var(--purple-bg);
    border: 1.5px solid var(--purple-border);
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 20px;
    position: relative;
  }
  .empty-icon svg {
    width: 32px;
    height: 32px;
    color: var(--purple);
  }
  /* Subtle shimmer effect on icon */
  .empty-icon::after {
    content: '';
    position: absolute;
    inset: -1px;
    border-radius: 20px;
    background: linear-gradient(135deg, rgba(124, 58, 237, 0.08), transparent 60%);
    pointer-events: none;
  }

  .empty-headline {
    font-size: 16px;
    font-weight: 600;
    color: var(--text-1);
    letter-spacing: -0.3px;
    margin-bottom: 8px;
  }

  .empty-desc {
    font-size: 13px;
    color: var(--text-2);
    line-height: 1.6;
    max-width: 320px;
    margin-bottom: 24px;
  }

  /* CTA button */
  .btn-create {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    height: 40px;
    padding: 0 22px;
    background: var(--purple);
    color: #fff;
    border: none;
    border-radius: var(--radius);
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    font-family: var(--font);
    transition: all 0.2s ease;
    box-shadow: 0 1px 3px rgba(124, 58, 237, 0.25), 0 4px 12px rgba(124, 58, 237, 0.15);
  }
  .btn-create:hover {
    background: #6D28D9;
    box-shadow: 0 1px 3px rgba(124, 58, 237, 0.3), 0 6px 16px rgba(124, 58, 237, 0.2);
    transform: translateY(-1px);
  }
  .btn-create:active {
    transform: translateY(0);
    box-shadow: 0 1px 3px rgba(124, 58, 237, 0.2);
  }
  .btn-create svg {
    width: 16px;
    height: 16px;
  }

  /* Info line */
  .empty-info {
    margin-top: 16px;
    font-size: 11px;
    color: var(--text-3);
    display: flex;
    align-items: center;
    gap: 5px;
  }
  .empty-info svg {
    width: 12px;
    height: 12px;
    flex-shrink: 0;
    opacity: 0.6;
  }
</style>
</head>
<body>

<!-- Screen label -->
<div class="screen-label">
  <div class="screen-num">01</div>
  <div class="screen-title">Password Tab <span>— Empty State</span></div>
</div>

<!-- Backdrop -->
<div class="backdrop"></div>

<!-- Modal -->
<div class="ff-modal">
  <!-- Header -->
  <div class="ff-modal-header">
    <button class="ff-close">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </button>
    <div class="ff-title">Share meeting</div>
    <div class="ff-subtitle">Product Roadmap Review — Mar 28, 2026</div>
  </div>

  <!-- Tabs -->
  <div class="ff-tabs">
    <button class="ff-tab">Invite</button>
    <button class="ff-tab active">
      Password
      <span class="badge-new">NEW</span>
    </button>
  </div>

  <!-- Body: Empty state -->
  <div class="ff-modal-body">
    <!-- Shield icon -->
    <div class="empty-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
        <path d="M9.5 12l2 2 3.5-3.5" stroke-width="2"/>
      </svg>
    </div>

    <!-- Text -->
    <div class="empty-headline">Password-protected sharing</div>
    <div class="empty-desc">Share this meeting with anyone outside your team. They'll need the password to access — no Fireflies account required.</div>

    <!-- CTA -->
    <button class="btn-create">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <circle cx="12" cy="12" r="2"/>
        <path d="M12 2v4m0 12v4m-7.07-2.93l2.83-2.83m8.48-8.48l2.83-2.83M2 12h4m12 0h4m-2.93 7.07l-2.83-2.83M6.76 6.76L3.93 3.93"/>
      </svg>
      Create password
    </button>

    <!-- Info line -->
    <div class="empty-info">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <circle cx="12" cy="12" r="10"/>
        <line x1="12" y1="16" x2="12" y2="12"/>
        <line x1="12" y1="8" x2="12.01" y2="8"/>
      </svg>
      This creates a separate link from your regular share link
    </div>
  </div>
</div>

</body>
</html>
