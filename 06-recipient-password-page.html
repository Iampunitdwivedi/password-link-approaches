<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>06 — Recipient Password Page</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #F7F6F3;
    --surface: #FFFFFF;
    --surface-2: #F0EFEC;
    --text-1: #1A1A1A;
    --text-2: #6B6B6B;
    --text-3: #9B9B9B;
    --border: #E5E4E1;
    --border-hover: #D0CFCC;
    --purple: #7C3AED;
    --purple-bg: #F5F0FF;
    --purple-border: #E0D4FC;
    --purple-text: #5B21B6;
    --green: #16A34A;
    --red: #DC2626;
    --radius: 10px;
    --radius-sm: 6px;
    --radius-lg: 14px;
    --font: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: var(--font);
    background: var(--bg);
    color: var(--text-1);
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .screen-label {
    position: fixed;
    top: 20px;
    left: 24px;
    display: flex;
    align-items: center;
    gap: 10px;
    z-index: 10;
  }
  .screen-num {
    background: var(--text-1);
    color: #fff;
    font-size: 11px;
    font-weight: 600;
    width: 28px;
    height: 28px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .screen-title {
    font-size: 13px;
    color: var(--text-2);
    font-weight: 500;
  }
  .screen-title span { color: var(--text-3); font-weight: 400; }

  /* Logo header */
  .logo-header {
    padding: 40px 0 0;
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 48px;
  }
  .logo-mark {
    width: 36px;
    height: 36px;
    border-radius: 10px;
    background: linear-gradient(135deg, #7C3AED, #A78BFA);
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .logo-mark svg {
    width: 20px;
    height: 20px;
    color: #fff;
  }
  .logo-text {
    font-size: 18px;
    font-weight: 600;
    color: var(--text-1);
    letter-spacing: -0.4px;
  }

  /* Card */
  .pw-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    width: 100%;
    max-width: 420px;
    padding: 36px 32px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.05), 0 1px 3px rgba(0,0,0,0.03);
    text-align: center;
    animation: cardIn 0.3s ease;
  }
  @keyframes cardIn {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* Lock icon */
  .lock-icon {
    width: 64px;
    height: 64px;
    border-radius: 18px;
    background: var(--purple-bg);
    border: 1.5px solid var(--purple-border);
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 20px;
  }
  .lock-icon svg {
    width: 28px;
    height: 28px;
    color: var(--purple);
  }

  .pw-card-title {
    font-size: 18px;
    font-weight: 600;
    color: var(--text-1);
    letter-spacing: -0.3px;
    margin-bottom: 16px;
  }

  /* Meeting info */
  .meeting-info {
    background: var(--surface-2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 16px;
    margin-bottom: 24px;
    text-align: left;
  }
  .meeting-name {
    font-size: 13px;
    font-weight: 600;
    color: var(--text-1);
    margin-bottom: 4px;
    letter-spacing: -0.1px;
  }
  .meeting-host {
    font-size: 12px;
    color: var(--text-3);
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .meeting-host-avatar {
    width: 18px;
    height: 18px;
    border-radius: 50%;
    background: var(--purple);
    display: flex;
    align-items: center;
    justify-content: center;
    color: #fff;
    font-size: 8px;
    font-weight: 600;
    flex-shrink: 0;
  }

  /* Form */
  .pw-form {
    text-align: left;
  }
  .pw-label {
    font-size: 12px;
    font-weight: 500;
    color: var(--text-2);
    margin-bottom: 6px;
    display: block;
  }
  .pw-input-wrap {
    position: relative;
    margin-bottom: 16px;
  }
  .pw-input {
    width: 100%;
    height: 44px;
    border: 1.5px solid var(--border);
    border-radius: var(--radius);
    padding: 0 44px 0 14px;
    font-size: 14px;
    color: var(--text-1);
    background: var(--surface);
    font-family: var(--font);
    transition: border-color 0.15s, box-shadow 0.15s;
    outline: none;
  }
  .pw-input:focus {
    border-color: var(--purple);
    box-shadow: 0 0 0 3px rgba(124, 58, 237, 0.1);
  }
  .pw-input::placeholder {
    color: var(--text-3);
    font-size: 13px;
  }
  .pw-toggle {
    position: absolute;
    right: 4px;
    top: 50%;
    transform: translateY(-50%);
    width: 34px;
    height: 34px;
    border: none;
    background: none;
    color: var(--text-3);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 6px;
    transition: all 0.15s;
  }
  .pw-toggle:hover {
    background: var(--surface-2);
    color: var(--text-2);
  }
  .pw-toggle svg {
    width: 18px;
    height: 18px;
  }

  .btn-access {
    width: 100%;
    height: 44px;
    background: var(--purple);
    color: #fff;
    border: none;
    border-radius: var(--radius);
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    font-family: var(--font);
    transition: all 0.15s;
    box-shadow: 0 1px 3px rgba(124, 58, 237, 0.25), 0 4px 12px rgba(124, 58, 237, 0.15);
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }
  .btn-access:hover {
    background: #6D28D9;
    box-shadow: 0 2px 6px rgba(124, 58, 237, 0.3);
    transform: translateY(-1px);
  }
  .btn-access svg {
    width: 16px;
    height: 16px;
  }

  /* Footer */
  .card-footer {
    margin-top: 20px;
    font-size: 12px;
    color: var(--text-3);
    text-align: center;
    line-height: 1.5;
  }

  /* Page footer */
  .page-footer {
    margin-top: auto;
    padding: 32px 0;
    font-size: 11px;
    color: var(--text-3);
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .page-footer a {
    color: var(--text-3);
    text-decoration: none;
  }
  .page-footer a:hover {
    color: var(--text-2);
  }
</style>
</head>
<body>

<div class="screen-label">
  <div class="screen-num">06</div>
  <div class="screen-title">Recipient <span>— Password Entry</span></div>
</div>

<!-- Logo -->
<div class="logo-header">
  <div class="logo-mark">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M12 2L2 7l10 5 10-5-10-5z"/>
      <path d="M2 17l10 5 10-5"/>
      <path d="M2 12l10 5 10-5"/>
    </svg>
  </div>
  <div class="logo-text">Fireflies.ai</div>
</div>

<!-- Card -->
<div class="pw-card">
  <!-- Lock icon -->
  <div class="lock-icon">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
      <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
      <circle cx="12" cy="16.5" r="1.5"/>
    </svg>
  </div>

  <div class="pw-card-title">This meeting is password-protected</div>

  <!-- Meeting info -->
  <div class="meeting-info">
    <div class="meeting-name">Fireflies Diarization Technology Overview</div>
    <div class="meeting-host">
      <span class="meeting-host-avatar">PD</span>
      Shared by Punit Dwivedi
    </div>
  </div>

  <!-- Form -->
  <div class="pw-form">
    <label class="pw-label">Password</label>
    <div class="pw-input-wrap">
      <input id="pwInput" type="password" class="pw-input" placeholder="Enter password" autocomplete="off">
      <button class="pw-toggle" id="pwToggle">
        <svg id="iconEye" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
          <circle cx="12" cy="12" r="3"/>
        </svg>
        <svg id="iconEyeOff" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none">
          <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
          <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
          <path d="M14.12 14.12a3 3 0 1 1-4.24-4.24"/>
          <line x1="1" y1="1" x2="23" y2="23"/>
        </svg>
      </button>
    </div>
    <button class="btn-access">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/>
        <polyline points="10 17 15 12 10 7"/>
        <line x1="15" y1="12" x2="3" y2="12"/>
      </svg>
      Access meeting
    </button>
  </div>

  <div class="card-footer">Don't have the password? Ask the person who shared this link with you.</div>
</div>

<!-- Page footer -->
<div class="page-footer">
  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
    <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
  </svg>
  Secured by <a href="#">Fireflies.ai</a>
</div>

<script>
  const pwInput = document.getElementById('pwInput');
  const pwToggle = document.getElementById('pwToggle');
  const iconEye = document.getElementById('iconEye');
  const iconEyeOff = document.getElementById('iconEyeOff');

  pwToggle.addEventListener('click', () => {
    const isPassword = pwInput.type === 'password';
    pwInput.type = isPassword ? 'text' : 'password';
    iconEye.style.display = isPassword ? 'none' : 'block';
    iconEyeOff.style.display = isPassword ? 'block' : 'none';
  });
</script>

</body>
</html>
