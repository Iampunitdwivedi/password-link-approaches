<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>02 — Password Tab Create</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #F7F6F3;
    --surface: #FFFFFF;
    --surface-2: #F0EFEC;
    --text-1: #1A1A1A;
    --text-2: #6B6B6B;
    --text-3: #9B9B9B;
    --border: #E5E4E1;
    --border-hover: #D0CFCC;
    --purple: #7C3AED;
    --purple-bg: #F5F0FF;
    --purple-border: #E0D4FC;
    --purple-text: #5B21B6;
    --green: #16A34A;
    --green-bg: #F0FDF4;
    --amber: #D97706;
    --amber-bg: #FFFBEB;
    --red: #DC2626;
    --radius: 10px;
    --radius-sm: 6px;
    --radius-lg: 14px;
    --font: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: var(--font);
    background: var(--bg);
    color: var(--text-1);
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
  }

  /* Screen label */
  .screen-label {
    position: fixed;
    top: 20px;
    left: 24px;
    display: flex;
    align-items: center;
    gap: 10px;
    z-index: 10;
  }
  .screen-num {
    background: var(--text-1);
    color: #fff;
    font-size: 11px;
    font-weight: 600;
    width: 28px;
    height: 28px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .screen-title {
    font-size: 13px;
    color: var(--text-2);
    font-weight: 500;
  }
  .screen-title span {
    color: var(--text-3);
    font-weight: 400;
  }

  /* Backdrop */
  .backdrop {
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.3);
    backdrop-filter: blur(2px);
    z-index: 1;
  }

  /* Modal */
  .ff-modal {
    background: var(--surface);
    border-radius: var(--radius-lg);
    border: 1px solid var(--border);
    width: 100%;
    max-width: 460px;
    position: relative;
    z-index: 2;
    box-shadow: 0 8px 32px rgba(0,0,0,0.08), 0 1px 3px rgba(0,0,0,0.04);
    animation: modalIn 0.3s ease;
  }
  @keyframes modalIn {
    from { opacity: 0; transform: translateY(12px) scale(0.98); }
    to { opacity: 1; transform: translateY(0) scale(1); }
  }

  /* Modal header */
  .ff-modal-header {
    padding: 22px 24px 0;
  }
  .ff-close {
    position: absolute;
    top: 18px;
    right: 18px;
    width: 28px;
    height: 28px;
    border: none;
    background: none;
    color: var(--text-3);
    cursor: pointer;
    font-size: 18px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 6px;
    transition: all 0.15s;
  }
  .ff-close:hover {
    background: var(--surface-2);
    color: var(--text-2);
  }
  .ff-title {
    font-size: 15px;
    font-weight: 600;
    color: var(--text-1);
    margin-bottom: 2px;
    padding-right: 28px;
    letter-spacing: -0.2px;
  }
  .ff-subtitle {
    font-size: 12px;
    color: var(--text-3);
    margin-bottom: 16px;
  }

  /* Tabs */
  .ff-tabs {
    display: flex;
    border-bottom: 1px solid var(--border);
    gap: 0;
    padding: 0 24px;
  }
  .ff-tab {
    padding: 10px 16px;
    font-size: 13px;
    font-family: var(--font);
    color: var(--text-3);
    cursor: pointer;
    position: relative;
    border: none;
    background: none;
    font-weight: 400;
    transition: color 0.15s;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .ff-tab:hover { color: var(--text-2); }
  .ff-tab.active {
    color: var(--text-1);
    font-weight: 500;
  }
  .ff-tab.active::after {
    content: '';
    position: absolute;
    bottom: -1px;
    left: 0;
    right: 0;
    height: 2px;
    background: var(--text-1);
    border-radius: 1px 1px 0 0;
  }
  .badge-new {
    font-size: 9px;
    background: var(--purple);
    color: #fff;
    padding: 1px 5px;
    border-radius: 4px;
    font-weight: 600;
    letter-spacing: 0.4px;
    text-transform: uppercase;
    line-height: 1.4;
  }

  /* Modal body */
  .ff-modal-body {
    padding: 24px;
  }

  /* Section heading inside body */
  .form-heading {
    font-size: 13px;
    font-weight: 600;
    color: var(--text-1);
    margin-bottom: 4px;
    letter-spacing: -0.1px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .form-heading svg {
    width: 16px;
    height: 16px;
    color: var(--purple);
  }
  .form-desc {
    font-size: 12px;
    color: var(--text-3);
    margin-bottom: 18px;
  }

  /* Password field */
  .pw-field {
    position: relative;
    margin-bottom: 14px;
  }
  .pw-label {
    font-size: 12px;
    font-weight: 500;
    color: var(--text-2);
    margin-bottom: 6px;
    display: block;
  }
  .pw-input-wrap {
    position: relative;
    display: flex;
    align-items: center;
  }
  .pw-input {
    width: 100%;
    height: 42px;
    border: 1.5px solid var(--border);
    border-radius: var(--radius);
    padding: 0 44px 0 14px;
    font-size: 14px;
    color: var(--text-1);
    background: var(--surface);
    font-family: var(--font);
    transition: border-color 0.15s, box-shadow 0.15s;
    letter-spacing: 0.3px;
    outline: none;
  }
  .pw-input:focus {
    border-color: var(--purple);
    box-shadow: 0 0 0 3px rgba(124, 58, 237, 0.1);
  }
  .pw-input::placeholder {
    color: var(--text-3);
    letter-spacing: 0;
    font-size: 13px;
  }
  .pw-toggle {
    position: absolute;
    right: 4px;
    top: 50%;
    transform: translateY(-50%);
    width: 34px;
    height: 34px;
    border: none;
    background: none;
    color: var(--text-3);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 6px;
    transition: all 0.15s;
  }
  .pw-toggle:hover {
    background: var(--surface-2);
    color: var(--text-2);
  }
  .pw-toggle svg {
    width: 18px;
    height: 18px;
  }

  /* Requirements */
  .pw-requirements {
    display: flex;
    flex-direction: column;
    gap: 8px;
    margin-bottom: 24px;
  }
  .pw-req {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 12px;
    color: var(--text-3);
    transition: color 0.2s;
  }
  .pw-req.met {
    color: var(--green);
  }
  .pw-req-icon {
    width: 18px;
    height: 18px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: all 0.2s;
  }
  /* Unmet state */
  .pw-req:not(.met) .pw-req-icon {
    background: var(--surface-2);
    border: 1.5px solid var(--border);
  }
  .pw-req:not(.met) .pw-req-icon svg {
    display: none;
  }
  /* Met state */
  .pw-req.met .pw-req-icon {
    background: var(--green);
    border: 1.5px solid var(--green);
  }
  .pw-req.met .pw-req-icon svg {
    display: block;
    width: 10px;
    height: 10px;
    color: #fff;
  }

  /* CTA button */
  .btn-create {
    width: 100%;
    height: 42px;
    padding: 0 20px;
    background: var(--purple);
    color: #fff;
    border: none;
    border-radius: var(--radius);
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    font-family: var(--font);
    transition: all 0.2s ease;
    box-shadow: 0 1px 3px rgba(124, 58, 237, 0.25), 0 4px 12px rgba(124, 58, 237, 0.15);
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }
  .btn-create:hover {
    background: #6D28D9;
    box-shadow: 0 1px 3px rgba(124, 58, 237, 0.3), 0 6px 16px rgba(124, 58, 237, 0.2);
    transform: translateY(-1px);
  }
  .btn-create:active {
    transform: translateY(0);
    box-shadow: 0 1px 3px rgba(124, 58, 237, 0.2);
  }
  .btn-create.disabled {
    background: var(--purple);
    opacity: 0.45;
    cursor: not-allowed;
    box-shadow: none;
    transform: none;
  }
  .btn-create svg {
    width: 16px;
    height: 16px;
  }

  /* Cancel */
  .btn-cancel {
    display: block;
    margin: 12px auto 0;
    background: none;
    border: none;
    font-size: 13px;
    color: var(--text-3);
    cursor: pointer;
    font-family: var(--font);
    padding: 4px 12px;
    border-radius: 6px;
    transition: all 0.15s;
  }
  .btn-cancel:hover {
    color: var(--text-2);
    background: var(--surface-2);
  }
</style>
</head>
<body>

<!-- Screen label -->
<div class="screen-label">
  <div class="screen-num">02</div>
  <div class="screen-title">Password Tab <span>— Create Password</span></div>
</div>

<!-- Backdrop -->
<div class="backdrop"></div>

<!-- Modal -->
<div class="ff-modal">
  <!-- Header -->
  <div class="ff-modal-header">
    <button class="ff-close">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </button>
    <div class="ff-title">Share meeting</div>
    <div class="ff-subtitle">Product Roadmap Review — Mar 28, 2026</div>
  </div>

  <!-- Tabs -->
  <div class="ff-tabs">
    <button class="ff-tab">Invite</button>
    <button class="ff-tab active">
      Password
      <span class="badge-new">NEW</span>
    </button>
  </div>

  <!-- Body -->
  <div class="ff-modal-body">
    <!-- Heading -->
    <div class="form-heading">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
        <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
        <circle cx="12" cy="16.5" r="1.5"/>
      </svg>
      Set a password
    </div>
    <div class="form-desc">Anyone with this password and the link can view the meeting.</div>

    <!-- Password input -->
    <div class="pw-field">
      <label class="pw-label">Password</label>
      <div class="pw-input-wrap">
        <input id="pwInput" type="password" class="pw-input" placeholder="Enter a password" autocomplete="off" spellcheck="false">
        <button class="pw-toggle" id="pwToggle" title="Show password">
          <!-- Eye icon (show) -->
          <svg id="iconEye" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
            <circle cx="12" cy="12" r="3"/>
          </svg>
          <!-- Eye-off icon (hide) -->
          <svg id="iconEyeOff" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none">
            <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
            <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
            <path d="M14.12 14.12a3 3 0 1 1-4.24-4.24"/>
            <line x1="1" y1="1" x2="23" y2="23"/>
          </svg>
        </button>
      </div>
    </div>

    <!-- Requirements checklist -->
    <div class="pw-requirements">
      <div class="pw-req" id="reqLength">
        <span class="pw-req-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="20 6 9 17 4 12"/>
          </svg>
        </span>
        At least 8 characters
      </div>
      <div class="pw-req" id="reqMixed">
        <span class="pw-req-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="20 6 9 17 4 12"/>
          </svg>
        </span>
        Contains a letter and a number
      </div>
    </div>

    <!-- Create button -->
    <button class="btn-create disabled" id="btnCreate">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/>
        <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/>
      </svg>
      Create password & generate link
    </button>

    <!-- Cancel -->
    <button class="btn-cancel">Cancel</button>
  </div>
</div>

<script>
  const pwInput = document.getElementById('pwInput');
  const pwToggle = document.getElementById('pwToggle');
  const iconEye = document.getElementById('iconEye');
  const iconEyeOff = document.getElementById('iconEyeOff');
  const reqLength = document.getElementById('reqLength');
  const reqMixed = document.getElementById('reqMixed');
  const btnCreate = document.getElementById('btnCreate');

  // Toggle password visibility
  pwToggle.addEventListener('click', () => {
    const isPassword = pwInput.type === 'password';
    pwInput.type = isPassword ? 'text' : 'password';
    iconEye.style.display = isPassword ? 'none' : 'block';
    iconEyeOff.style.display = isPassword ? 'block' : 'none';
    pwToggle.title = isPassword ? 'Hide password' : 'Show password';
  });

  // Live validation
  pwInput.addEventListener('input', () => {
    const val = pwInput.value;
    const hasLength = val.length >= 8;
    const hasLetter = /[a-zA-Z]/.test(val);
    const hasNumber = /[0-9]/.test(val);
    const hasMixed = hasLetter && hasNumber;

    reqLength.classList.toggle('met', hasLength);
    reqMixed.classList.toggle('met', hasMixed);

    if (hasLength && hasMixed) {
      btnCreate.classList.remove('disabled');
    } else {
      btnCreate.classList.add('disabled');
    }
  });

  // Focus input on load
  setTimeout(() => pwInput.focus(), 400);
</script>

</body>
</html>
